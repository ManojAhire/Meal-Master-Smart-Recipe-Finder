<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meal Master - Smart Recipe Finder</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header id="topbar">
        <div id="site-name">
            <h1>MEAL MASTER -----(Find recipes with what you have!)</h1>
            <p>🙏अन्नं ब्रह्म🙏 ---- Food is Divine</p>
            <button id="dark">Dark Mode</button>
        </div>
        <div id="upcoming-ad">
            <p>🚀 Upcoming Project: Newton Da Dhabba 😋</p>
        </div>
    </header>

    <nav id="filterbtns">
        <button class="f">All</button>
        <button class="f">Chicken</button>
        <button class="f">Beef</button>
        <button class="f">Seafood</button>
        <button class="f">Vegetarian</button>
        <button class="f">Dessert</button>
        <button class="f">Pasta</button>
    </nav>

    <main id="wrapper">

        <section id="searcharea">
            <input type="text" id="searchbox" placeholder="Search for a meal...">
            <button id="searchbtn">Search</button>
            <button id="clearbtn">Clear</button>
            
            <!-- Sorting Buttons added below for Array Sorting Feature -->
            <div id="sortarea" style="margin-top: 15px;">
                <button id="sortAscBtn" class="sortbtn">Sort A-Z</button>
                <button id="sortDescBtn" class="sortbtn">Sort Z-A</button>
            </div>
        </section>

        <section id="randombtnbox">
            <button id="randombtn">Surprise Me!</button>
        </section>

        <section id="mealsarea">
            <p id="waitMsg">Loading...</p>
            <p id="oopsMsg">Error! Try again.</p>
            <p id="nothingMsg">No meals found.</p>

            <div id="allcards"></div>
        </section>

        <div id="recipePopup">
            <div id="popupBox">
                <button id="closePopup">Close</button>
                <article id="popupContent"></article>
            </div>
        </div>

    </main>

    <footer id="sitebottom">
        <p>App designed by Param Gyani <strong>Manoj Ahire</strong> ----------- Khali pet Dimag ki batti nahi jalti </p>
    </footer>

    <script src="script.js"></script>

</body>
</html>
